<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        body{
                background-color:  #0f0f1a;

        }

        
    h1{
        margin: 50px 0;
        text-align: center;
        color: wheat;
    }
    img{
        margin-bottom: 10px;
    }
button{
    padding: 8px 15px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
}
.btn-delete{
    background-color: red;
    color: wheat;
}.btn-edit  {
    background-color: green;
    color: wheat;
}
</style>
</head>

<body>

<div class="admin-container">
<h1>All Properties</h1>
<div id="propertiesContainer" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; "></div>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyBvrWq6iIjoKgvN6yP21l9cTl1Ud1-2C6c",
  authDomain: "realestate-5462f.firebaseapp.com",
  projectId: "realestate-5462f",
  storageBucket: "realestate-5462f.firebasestorage.app",
  messagingSenderId: "980302993047",
  appId: "1:980302993047:web:10238081ce6a8a5727bbd2"
};

// ===== Initialize Firebase =====
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ===== Elements =====
const container = document.getElementById("propertiesContainer");

// ===== Load Properties =====
async function loadProperties() {
  const querySnapshot = await getDocs(collection(db, "properties"));
  container.innerHTML = "";

  querySnapshot.forEach(docSnap => {
    const p = docSnap.data();
    const id = docSnap.id;

    container.innerHTML += `
      <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:12px;">
        <img src="${p.image}" style="width:100%; height:200px; object-fit:cover; border-radius:10px;">
        <h3 style="color:white;">${p.title}</h3>
        <p style="color:white;">${p.location}</p>
        <p style="color:white;">$${p.price}</p>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="btn-view" onclick="view('${id}')">View</button>
          <button class="btn-edit" onclick="edit('${id}')">Edit</button>
          <button class="btn-delete" onclick="remove('${id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

// ===== Button Functions =====
window.view = (id) => {
  location.href = `pd.html?id=${id}`;
};

window.edit = (id) => {
  location.href = `admin-dashboard.html?id=${id}`;
};

// ===== Delete Property with Admin Check =====
window.remove = async (id) => {
  const user = auth.currentUser;
  if (!user) {
    alert("You must be logged in to delete properties!");
    return;
  }

  try {
    // تحقق من بيانات المستخدم وصلاحية Admin
    const userSnap = await getDoc(doc(db, "users", user.uid));
    if (!userSnap.exists()) {
      alert("User data not found!");
      return;
    }

    const userData = userSnap.data();
    if (userData.role !== "admin") {
      alert("You do not have permission to delete properties!");
      return;
    }

    // تأكيد الحذف
    if (confirm("Delete property?")) {
      await deleteDoc(doc(db, "properties", id));
      alert("Deleted ✅");
      loadProperties(); // تحديث قائمة العقارات
    }
  } catch (err) {
    console.error("Failed to delete property:", err);
    alert("Failed to delete. Check console for error.");
  }
};

// ===== Initialize =====
document.addEventListener("DOMContentLoaded", () => {
  loadProperties();
});





</script>

</body>
</html>
